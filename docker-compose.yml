networks:
    frontend-net:
        driver: bridge
    backend-net:
        driver: bridge
    monitoring-net:
        driver: bridge

volumes:
    db-data:
    prometheus-data:
    grafana-data:

services:
    db:
        image: mysql:8.0
        container_name: todo-db
        restart: unless-stopped
        networks:
            - backend-net
        volumes:
            - db-data:/var/lib/mysql
            - ./db-init.sql:/docker-entrypoint-initdb.d/init.sql
        environment:
            MYSQL_ROOT_PASSWORD: rootpass
            MYSQL_DATABASE: tododb
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    backend:
        build: ./backend
        container_name: todo-backend
        restart: on-failure
        networks:
            - backend-net
        environment:
            DB_HOST: db
            DB_USER: root
            DB_PASSWORD: rootpass
            DB_NAME: tododb
        depends_on:
            db:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 128M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

        healthcheck:
            test: ["CMD", "wget", "-qo-", "http://localhost:3000/api/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s

    frontend:
        build: ./frontend
        container_name: todo-frontend
        restart: unless-stopped
        networks:
            - frontend-net
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 64M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        healthcheck:
            test: ["CMD", "wget", "-qo-", "http://localhost:80"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s
    
    proxy:
        image: nginx:alpine
        container_name: todo-proxy
        restart: always
        networks:
            - frontend-net
            - backend-net
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            frontend:
                condition: service_healthy
            backend:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 64M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        healthcheck:
            test: ["CMD", "wget", "-qo-", "http://localhost:80"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s
    