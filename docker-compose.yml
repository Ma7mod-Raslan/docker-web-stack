networks:
    frontend-net:
        driver: bridge
    backend-net:
        driver: bridge
    monitoring-net:
        driver: bridge

volumes:
    db-data:
    prometheus-data:
    grafana-data:

services:
    db:
        image: mysql:8.0
        container_name: todo-db
        restart: unless-stopped
        networks:
            - backend-net
        volumes:
            - db-data:/var/lib/mysql
            - ./db-init.sql:/docker-entrypoint-initdb.d/init.sql
        environment:
            MYSQL_ROOT_PASSWORD: rootpass
            MYSQL_DATABASE: tododb
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    backend:
        build: ./backend
        container_name: todo-backend
        restart: on-failure
        networks:
            - backend-net
        environment:
            DB_HOST: db
            DB_USER: root
            DB_PASSWORD: rootpass
            DB_NAME: tododb
        depends_on:
            db:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 128M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s

    frontend:
        build: ./frontend
        container_name: todo-frontend
        restart: unless-stopped
        networks:
            - frontend-net
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 64M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://127.0.0.1:80 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s
    
    proxy:
        image: nginx:alpine
        container_name: todo-proxy
        restart: always
        networks:
            - frontend-net
            - backend-net
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            frontend:
                condition: service_healthy
            backend:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 64M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://127.0.0.1:80 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s
    
    cadvisor:
        image: gcr.io/cadvisor/cadvisor:latest
        container_name: cadvisor
        restart: unless-stopped
        networks:
            - monitoring-net
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
        ports:
            - "8080:8080"
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 128M
        logging:
            driver: "none"
        
    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        restart: unless-stopped
        networks:
            - monitoring-net
        volumes:
            - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
        logging:   
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "2"
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 15s

    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        restart: unless-stopped
        networks:
            - monitoring-net
        ports:
            - "3001:3000"
        volumes:
            - grafana-data:/var/lib/grafana
        environment:
            GF_SECURITY_ADMIN_PASSWORD: admin123
            GF_USERS_ALLOW_SIGN_UP: "false"
        depends_on:
            prometheus:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "2"
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3